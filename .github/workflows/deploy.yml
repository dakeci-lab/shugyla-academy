name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Resolve VAPID public key
        id: vapid
        run: |
          if [ -f config/production-vapid-public.key ]; then
            KEY="$(tr -d '\n' < config/production-vapid-public.key)"
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "public_key=$KEY" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "public_key=" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve production Web Push E2E test flag
        id: web_push_e2e
        run: |
          if [ -f config/production-web-push-e2e-test.flag ] && [ "$(tr -d '[:space:]' < config/production-web-push-e2e-test.flag)" = "enabled" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_WEB_PUSH_VAPID_PUBLIC_KEY: ${{ steps.vapid.outputs.public_key }}
          VITE_WEB_PUSH_PRODUCTION_E2E_TEST: ${{ steps.web_push_e2e.outputs.enabled == 'true' && 'true' || '' }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
